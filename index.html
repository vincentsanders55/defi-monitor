<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeFi Position Monitor</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0d1117;
    --card: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --green: #3fb950;
    --orange: #d29922;
    --red: #f85149;
    --blue: #58a6ff;
    --purple: #bc8cff;
  }

  body {
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    background: var(--bg);
    color: var(--text);
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 20px;
  }

  .widget {
    width: 420px;
    max-height: 95vh;
    overflow-y: auto;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
  }

  .header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .pool-name {
    font-size: 16px;
    font-weight: 700;
  }

  .chain-badge {
    font-size: 10px;
    background: #2563eb;
    color: white;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 600;
  }

  .fee-badge {
    font-size: 10px;
    background: var(--border);
    color: var(--text-dim);
    padding: 2px 8px;
    border-radius: 10px;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    display: inline-block;
  }

  .status-dot.live { background: var(--green); animation: pulse 2s infinite; }
  .status-dot.warning { background: var(--orange); animation: pulse 1s infinite; }
  .status-dot.danger { background: var(--red); animation: pulse 0.5s infinite; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .refresh-info {
    font-size: 10px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* Range visualizer */
  .range-section {
    padding: 20px;
    border-bottom: 1px solid var(--border);
  }

  .range-label {
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .range-bar-container {
    position: relative;
    height: 36px;
    background: #21262d;
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 8px;
  }

  .range-bar-fill {
    position: absolute;
    top: 0;
    height: 100%;
    background: linear-gradient(90deg, rgba(63,185,80,0.15), rgba(63,185,80,0.25), rgba(63,185,80,0.15));
    border-left: 2px solid var(--green);
    border-right: 2px solid var(--green);
  }

  .range-bar-cursor {
    position: absolute;
    top: 2px;
    bottom: 2px;
    width: 3px;
    background: white;
    border-radius: 2px;
    z-index: 2;
    box-shadow: 0 0 8px rgba(255,255,255,0.5);
  }

  .range-prices {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--text-dim);
  }

  .range-prices .current {
    color: white;
    font-weight: 600;
  }

  /* Status banner */
  .status-banner {
    padding: 10px 20px;
    text-align: center;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
  }

  .status-banner.in-range { background: rgba(63,185,80,0.1); color: var(--green); }
  .status-banner.near-edge { background: rgba(210,153,34,0.1); color: var(--orange); }
  .status-banner.out-of-range { background: rgba(248,81,73,0.1); color: var(--red); }

  /* KPI grid */
  .kpi-grid {
    padding: 16px 20px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    border-bottom: 1px solid var(--border);
  }

  .kpi {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .kpi-label {
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .kpi-value {
    font-size: 18px;
    font-weight: 700;
  }

  .kpi-value.small {
    font-size: 14px;
  }

  .kpi-sub {
    font-size: 10px;
    color: var(--text-dim);
  }

  .kpi-value.positive { color: var(--green); }
  .kpi-value.negative { color: var(--red); }
  .kpi-value.neutral { color: var(--text); }

  /* Fees section */
  .fees-section {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
  }

  .fees-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 4px 0;
    font-size: 13px;
  }

  .fees-row .label { color: var(--text-dim); }
  .fees-row .value { font-weight: 600; }

  /* Footer */
  .footer {
    padding: 12px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 10px;
    color: var(--text-dim);
  }

  .footer a {
    color: var(--blue);
    text-decoration: none;
  }

  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 20px;
    gap: 12px;
  }

  .spinner {
    width: 24px;
    height: 24px;
    border: 2px solid var(--border);
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .error-msg {
    color: var(--red);
    font-size: 12px;
    text-align: center;
    padding: 12px;
  }

  .kpi-wide {
    grid-column: 1 / -1;
  }

  .distance-bar {
    display: flex;
    gap: 4px;
    align-items: center;
    margin-top: 4px;
  }

  .distance-bar .bar {
    flex: 1;
    height: 4px;
    border-radius: 2px;
    background: var(--border);
  }

  .distance-bar .bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.3s;
  }

  .distance-bar .pct {
    font-size: 10px;
    min-width: 35px;
    text-align: right;
  }
</style>
</head>
<body>

<div class="widget" id="widget">
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <span style="font-size: 12px; color: var(--text-dim);">Loading on-chain data...</span>
  </div>
</div>

<script>
// ============================================================
// CONFIG
// ============================================================
const CONFIG = {
  walletAddress: '0xAD4D00A7Fda0E15A9aF57b26fF9b162D966878B7',
  sickleAddress: '0x2EEDfAAd14D5333Ec4455a1E549A608684e7F890',
  nftManager: '0x03a520b32C04BF3bEEf7BEb72E919cf822Ed34f1',
  refreshInterval: 30000,
  rpcUrls: [
    'https://base.llamarpc.com',
    'https://base-rpc.publicnode.com',
    'https://1rpc.io/base',
    'https://mainnet.base.org',
  ],
  rpcIndex: 0,
  // Known token decimals by address (lowercase)
  tokenDecimals: {
    '0x833589fcd6edb6e08f4c7c32d4f71b54bda02913': 6,  // USDC
    '0xcbb7c0000ab88b473b1f5afd9ef808440eed33bf': 8,  // cbBTC
    '0x4200000000000000000000000000000000000006': 18, // WETH
  },
  tokenSymbols: {
    '0x833589fcd6edb6e08f4c7c32d4f71b54bda02913': 'USDC',
    '0xcbb7c0000ab88b473b1f5afd9ef808440eed33bf': 'cbBTC',
    '0x4200000000000000000000000000000000000006': 'WETH',
  },
  // Fee tier to label
  feeTierLabel: { 100: '0.01%', 500: '0.05%', 3000: '0.3%', 10000: '1%' },
};

// ============================================================
// ABI fragments (minimal)
// ============================================================
const POOL_ABI = {
  slot0: 'function slot0() view returns (uint160 sqrtPriceX96, int24 tick, uint16 observationIndex, uint16 observationCardinality, uint16 observationCardinalityNext, uint8 feeProtocol, bool unlocked)',
};

const NFT_ABI = {
  positions: 'function positions(uint256 tokenId) view returns (uint96 nonce, address operator, address token0, address token1, uint24 fee, int24 tickLower, int24 tickUpper, uint128 liquidity, uint256 feeGrowthInside0LastX128, uint256 feeGrowthInside1LastX128, uint128 tokensOwed0, uint128 tokensOwed1)',
};

// ============================================================
// RPC helpers (raw eth_call, no library needed)
// ============================================================
function encodeFunctionCall(sig, params = []) {
  // Simple ABI encoder for our specific calls
  const hash = fnSelector(sig);
  let data = '0x' + hash;
  for (const p of params) {
    data += BigInt(p).toString(16).padStart(64, '0');
  }
  return data;
}

function fnSelector(sig) {
  // keccak256 of function signature
  const encoder = new TextEncoder();
  const data = encoder.encode(sig);
  return keccak256(data).slice(0, 8);
}

// Minimal keccak256 implementation
function keccak256(input) {
  // Using SubtleCrypto is async and doesn't support keccak.
  // We'll use a minimal JS keccak256.
  return keccak256Impl(input instanceof Uint8Array ? input : new TextEncoder().encode(input));
}

// Keccak-256 (minimal implementation)
function keccak256Impl(message) {
  const RC = [
    0x0000000000000001n, 0x0000000000008082n, 0x800000000000808An, 0x8000000080008000n,
    0x000000000000808Bn, 0x0000000080000001n, 0x8000000080008081n, 0x8000000000008009n,
    0x000000000000008An, 0x0000000000000088n, 0x0000000080008009n, 0x000000008000000An,
    0x000000008000808Bn, 0x800000000000008Bn, 0x8000000000008089n, 0x8000000000008003n,
    0x8000000000008002n, 0x8000000000000080n, 0x000000000000800An, 0x800000008000000An,
    0x8000000080008081n, 0x8000000000008080n, 0x0000000080000001n, 0x8000000080008008n,
  ];
  const ROTC = [
    1,3,6,10,15,21,28,36,45,55,2,14,27,41,56,8,25,43,62,18,39,61,20,44
  ];
  const PI = [
    10,7,11,17,18,3,5,16,8,21,24,4,15,23,19,13,12,2,20,14,22,9,6,1
  ];

  const rate = 136;
  const capacity = 64;

  // Pad message
  const msgLen = message.length;
  const blockSize = rate;
  const padLen = blockSize - (msgLen % blockSize);
  const padded = new Uint8Array(msgLen + padLen);
  padded.set(message);
  padded[msgLen] = 0x01;
  padded[padded.length - 1] |= 0x80;

  // State
  const state = new Array(25).fill(0n);

  // Absorb
  for (let offset = 0; offset < padded.length; offset += blockSize) {
    for (let i = 0; i < blockSize / 8; i++) {
      const idx = offset + i * 8;
      let lane = 0n;
      for (let b = 0; b < 8; b++) {
        lane |= BigInt(padded[idx + b]) << BigInt(b * 8);
      }
      state[i] ^= lane;
    }
    keccakF(state, RC, ROTC, PI);
  }

  // Squeeze (256 bits = 32 bytes = 4 lanes)
  let hash = '';
  for (let i = 0; i < 4; i++) {
    for (let b = 0; b < 8; b++) {
      hash += ((state[i] >> BigInt(b * 8)) & 0xFFn).toString(16).padStart(2, '0');
    }
  }
  return hash;

  function keccakF(state, RC, ROTC, PI) {
    for (let round = 0; round < 24; round++) {
      // θ
      const C = new Array(5);
      for (let x = 0; x < 5; x++) {
        C[x] = state[x] ^ state[x + 5] ^ state[x + 10] ^ state[x + 15] ^ state[x + 20];
      }
      for (let x = 0; x < 5; x++) {
        const D = C[(x + 4) % 5] ^ rot64(C[(x + 1) % 5], 1n);
        for (let y = 0; y < 25; y += 5) {
          state[y + x] ^= D;
        }
      }
      // ρ and π
      let last = state[1];
      for (let i = 0; i < 24; i++) {
        const j = PI[i];
        const temp = state[j];
        state[j] = rot64(last, BigInt(ROTC[i]));
        last = temp;
      }
      // χ
      for (let y = 0; y < 25; y += 5) {
        const t = [state[y], state[y+1], state[y+2], state[y+3], state[y+4]];
        for (let x = 0; x < 5; x++) {
          state[y + x] = t[x] ^ ((~t[(x+1)%5]) & t[(x+2)%5]);
        }
      }
      // ι
      state[0] ^= RC[round];
    }
  }

  function rot64(x, n) {
    x = BigInt.asUintN(64, x);
    n = BigInt.asUintN(64, n);
    return BigInt.asUintN(64, (x << n) | (x >> (64n - n)));
  }
}

// Pre-computed selectors
const SEL = {
  slot0: '3850c7bd',
  positions: '99fbab88',
  feeGrowthGlobal0X128: 'f3058399',
  feeGrowthGlobal1X128: '46141319',
  ticks: 'f30dba93',
  balanceOf: '70a08231',
  tokenOfOwnerByIndex: '2f745c59',
  factory: 'c45a0155',
  getPool: '1698ee82',
};

function getRpcUrl() {
  return CONFIG.rpcUrls[CONFIG.rpcIndex % CONFIG.rpcUrls.length];
}

function rotateRpc() {
  CONFIG.rpcIndex = (CONFIG.rpcIndex + 1) % CONFIG.rpcUrls.length;
  console.log('Switched RPC to:', getRpcUrl());
}

async function safeJson(resp) {
  const text = await resp.text();
  try { return JSON.parse(text); }
  catch { console.warn('Non-JSON response:', text.slice(0, 120)); return null; }
}
async function safeFetchJson(url, opts) {
  const resp = await fetch(url, opts);
  return safeJson(resp);
}

async function rpcCall(to, data, retries = 2) {
  for (let i = 0; i <= retries; i++) {
    try {
      const resp = await fetch(getRpcUrl(), {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          jsonrpc: '2.0',
          method: 'eth_call',
          params: [{ to, data }, 'latest'],
          id: 1,
        }),
      });
      const json = await safeJson(resp);
      if (!json) { rotateRpc(); if (i < retries) continue; throw new Error('RPC returned non-JSON'); }
      if (json.error) {
        if (json.error.message?.includes('rate limit') || json.error.code === 429) {
          rotateRpc();
          continue;
        }
        throw new Error(json.error.message);
      }
      return json.result;
    } catch (err) {
      if (i < retries && (err.message?.includes('rate') || err.message?.includes('429') || err.message?.includes('fetch'))) {
        rotateRpc();
        continue;
      }
      throw err;
    }
  }
}

function decodeUint(hex, offset) {
  return BigInt('0x' + hex.slice(2 + offset * 64, 2 + (offset + 1) * 64));
}

function decodeInt(hex, offset) {
  const val = decodeUint(hex, offset);
  if (val >= (1n << 255n)) return val - (1n << 256n);
  return val;
}

// ============================================================
// On-chain data fetching
// ============================================================
async function fetchPoolSlot0(poolAddress) {
  const result = await rpcCall(poolAddress, '0x' + SEL.slot0);
  return {
    sqrtPriceX96: decodeUint(result, 0),
    tick: Number(decodeInt(result, 1)),
  };
}

async function fetchSinglePosition(tokenId) {
  const tokenIdHex = tokenId.toString(16).padStart(64, '0');
  const data = '0x' + SEL.positions + tokenIdHex;
  const result = await rpcCall(CONFIG.nftManager, data);
  const liquidity = decodeUint(result, 7);
  // Skip positions with 0 liquidity (closed)
  if (liquidity === 0n) return null;
  const token0 = '0x' + decodeUint(result, 2).toString(16).padStart(40, '0');
  const token1 = '0x' + decodeUint(result, 3).toString(16).padStart(40, '0');
  const fee = Number(decodeUint(result, 4));
  return {
    tokenId,
    token0,
    token1,
    fee,
    tickLower: Number(decodeInt(result, 5)),
    tickUpper: Number(decodeInt(result, 6)),
    liquidity,
    feeGrowthInside0LastX128: decodeUint(result, 8),
    feeGrowthInside1LastX128: decodeUint(result, 9),
    tokensOwed0: decodeUint(result, 10),
    tokensOwed1: decodeUint(result, 11),
    // Derived labels
    token0Symbol: CONFIG.tokenSymbols[token0.toLowerCase()] || token0.slice(0,6),
    token1Symbol: CONFIG.tokenSymbols[token1.toLowerCase()] || token1.slice(0,6),
    token0Decimals: CONFIG.tokenDecimals[token0.toLowerCase()] || 18,
    token1Decimals: CONFIG.tokenDecimals[token1.toLowerCase()] || 18,
    feeLabel: CONFIG.feeTierLabel[fee] || fee + '',
  };
}

async function discoverAllPositions() {
  // Get NFT count for Sickle wallet
  const addrHex = CONFIG.sickleAddress.slice(2).toLowerCase().padStart(64, '0');
  const balResult = await rpcCall(CONFIG.nftManager, '0x' + SEL.balanceOf + addrHex);
  const count = Number(decodeUint(balResult, 0));
  console.log(`Found ${count} NFT(s) on Sickle wallet`);

  if (count === 0) return [];

  // Get all token IDs
  const tokenIds = [];
  for (let i = 0; i < count; i++) {
    const idxHex = BigInt(i).toString(16).padStart(64, '0');
    const result = await rpcCall(CONFIG.nftManager, '0x' + SEL.tokenOfOwnerByIndex + addrHex + idxHex);
    tokenIds.push(decodeUint(result, 0));
  }

  // Fetch all positions in parallel
  const positions = await Promise.all(tokenIds.map(id => fetchSinglePosition(id)));
  return positions.filter(p => p !== null);
}

// Uniswap V3 Factory on Base
const UNI_V3_FACTORY = '0x33128a8fC17869897dcE68Ed026d694621f6FDfD';

async function getPoolAddress(token0, token1, fee) {
  // Sort tokens
  const [t0, t1] = BigInt(token0) < BigInt(token1) ? [token0, token1] : [token1, token0];
  const data = '0x' + SEL.getPool
    + t0.slice(2).toLowerCase().padStart(64, '0')
    + t1.slice(2).toLowerCase().padStart(64, '0')
    + BigInt(fee).toString(16).padStart(64, '0');
  const result = await rpcCall(UNI_V3_FACTORY, data);
  return '0x' + decodeUint(result, 0).toString(16).padStart(40, '0');
}

// Cache mint timestamps (they never change)
const mintTimestampCache = {};

async function fetchMintTimestamp(tokenId) {
  const key = tokenId.toString();
  if (mintTimestampCache[key]) return mintTimestampCache[key];

  // Use BaseScan API (free, no key needed for basic calls)
  try {
    const nftAddr = CONFIG.nftManager.toLowerCase();
    const tokenIdHex = '0x' + tokenId.toString(16);
    // Get transfer events for this NFT via BaseScan
    const url = `https://api.basescan.org/api?module=account&action=tokennfttx&contractaddress=${nftAddr}&address=${CONFIG.sickleAddress}&startblock=0&endblock=99999999&sort=asc`;
    const json = await safeFetchJson(url);
    if (!json) throw new Error('BaseScan returned non-JSON');

    if (json.status === '1' && json.result) {
      // Find the mint (from = 0x0) for our tokenId
      const mint = json.result.find(tx =>
        tx.tokenID === tokenId.toString() &&
        tx.from === '0x0000000000000000000000000000000000000000'
      );
      if (mint) {
        const ts = Number(mint.timeStamp);
        mintTimestampCache[key] = ts;
        console.log(`Mint timestamp for NFT #${key}: ${new Date(ts * 1000).toISOString()}`);
        return ts;
      }
    }
  } catch (e) {
    console.warn('BaseScan API failed:', e);
  }

  // Fallback: try RPC eth_getLogs with recent block range (~30 days)
  try {
    // Get current block
    const blockResp = await fetch(getRpcUrl(), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ jsonrpc: '2.0', method: 'eth_blockNumber', params: [], id: 1 }),
    });
    const blockJson = await safeJson(blockResp);
    if (!blockJson) throw new Error('RPC non-JSON');
    const currentBlock = BigInt(blockJson.result);
    const fromBlock = '0x' + (currentBlock - 1300000n).toString(16); // ~30 days on Base (2s blocks)

    const transferTopic = '0xddf252ad1be2c89b69c2b068fc378daa952ba7f163c4a11628f55a4df523b3ef';
    const zeroTopic = '0x' + '0'.repeat(64);
    const tokenIdTopic = '0x' + tokenId.toString(16).padStart(64, '0');

    const logResp = await fetch(getRpcUrl(), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        jsonrpc: '2.0',
        method: 'eth_getLogs',
        params: [{ address: CONFIG.nftManager, topics: [transferTopic, zeroTopic, null, tokenIdTopic], fromBlock, toBlock: 'latest' }],
        id: 1,
      }),
    });
    const logJson = await safeJson(logResp);
    if (!logJson) throw new Error('RPC non-JSON');
    if (!logJson.error && logJson.result && logJson.result.length > 0) {
      const mintBlock = logJson.result[0].blockNumber;
      const blkResp = await fetch(getRpcUrl(), {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ jsonrpc: '2.0', method: 'eth_getBlockByNumber', params: [mintBlock, false], id: 1 }),
      });
      const blkJson = await safeJson(blkResp);
      if (blkJson.result) {
        const ts = Number(BigInt(blkJson.result.timestamp));
        mintTimestampCache[key] = ts;
        return ts;
      }
    }
  } catch (e) {
    console.warn('RPC getLogs failed:', e);
  }

  // Last resort: known mint timestamps
  const knownMints = {
    '5017208': 1776974765, // 2026-04-23 20:06:05 UTC
  };
  if (knownMints[key]) {
    mintTimestampCache[key] = knownMints[key];
    return knownMints[key];
  }

  return null;
}

// Fetch all Collect events for a position (= total harvested fees, on-chain history)
// Collect(uint256 indexed tokenId, address recipient, uint128 amount0, uint128 amount1)
const harvestedCache = {};
let harvestedCacheTs = 0;

async function fetchHarvestedFees(tokenId, dec0, dec1) {
  const key = tokenId.toString();
  // Cache 5 min
  if (harvestedCache[key] && Date.now() - harvestedCacheTs < 300000) return harvestedCache[key];

  try {
    // Collect event topic: keccak256("Collect(uint256,address,uint128,uint128)")
    const collectTopic = '0x40d0efd1a53d60ecbf40971b9daf7dc90178c3aadc7aab1765632738fa8b8f01';

// Fetch BTC price at a specific timestamp via CoinGecko
const entryPriceCache = {};

async function fetchBtcPriceAtTime(timestamp) {
  const key = timestamp.toString();
  if (entryPriceCache[key]) return entryPriceCache[key];

  for (let attempt = 0; attempt < 3; attempt++) {
    try {
      if (attempt > 0) await new Promise(r => setTimeout(r, 3000));
      const from = timestamp - 300;
      const to = timestamp + 300;
      const resp = await fetch(`https://api.coingecko.com/api/v3/coins/bitcoin/market_chart/range?vs_currency=usd&from=${from}&to=${to}`);
      if (resp.status === 429) continue;
      const json = await safeJson(resp);
      if (!json) continue;
      if (json.prices && json.prices.length > 0) {
        entryPriceCache[key] = json.prices[0][1];
        return entryPriceCache[key];
      }
    } catch (e) {
      console.warn('CoinGecko historical price attempt', attempt, e);
    }
  }
  return null;
}

function encodeInt24(tick) {
  // ABI encode int24 as int256 (left-padded, two's complement for negatives)
  if (tick >= 0) return BigInt(tick).toString(16).padStart(64, '0');
  return (BigInt(2)**BigInt(256) + BigInt(tick)).toString(16).padStart(64, '0');
}

async function fetchTickData(tick, poolAddr) {
  const data = '0x' + SEL.ticks + encodeInt24(tick);
  const result = await rpcCall(poolAddr, data);
  return {
    feeGrowthOutside0X128: decodeUint(result, 2),
    feeGrowthOutside1X128: decodeUint(result, 3),
  };
}

async function fetchFeeGrowthGlobals(poolAddr) {
  const [r0, r1] = await Promise.all([
    rpcCall(poolAddr, '0x' + SEL.feeGrowthGlobal0X128),
    rpcCall(poolAddr, '0x' + SEL.feeGrowthGlobal1X128),
  ]);
  return {
    feeGrowthGlobal0X128: decodeUint(r0, 0),
    feeGrowthGlobal1X128: decodeUint(r1, 0),
  };
}

const Q128 = 2n ** 128n;
const MAX_UINT256 = 2n ** 256n;

// Modular subtraction (handles underflow wrapping)
function subMod(a, b) {
  return ((a - b) + MAX_UINT256) % MAX_UINT256;
}

function computeUnclaimedFees(position, feeGlobals, tickLowerData, tickUpperData, currentTick, dec0, dec1) {
  const { feeGrowthGlobal0X128, feeGrowthGlobal1X128 } = feeGlobals;

  // feeGrowthBelow
  let feeGrowthBelow0, feeGrowthBelow1;
  if (currentTick >= position.tickLower) {
    feeGrowthBelow0 = tickLowerData.feeGrowthOutside0X128;
    feeGrowthBelow1 = tickLowerData.feeGrowthOutside1X128;
  } else {
    feeGrowthBelow0 = subMod(feeGrowthGlobal0X128, tickLowerData.feeGrowthOutside0X128);
    feeGrowthBelow1 = subMod(feeGrowthGlobal1X128, tickLowerData.feeGrowthOutside1X128);
  }

  // feeGrowthAbove
  let feeGrowthAbove0, feeGrowthAbove1;
  if (currentTick < position.tickUpper) {
    feeGrowthAbove0 = tickUpperData.feeGrowthOutside0X128;
    feeGrowthAbove1 = tickUpperData.feeGrowthOutside1X128;
  } else {
    feeGrowthAbove0 = subMod(feeGrowthGlobal0X128, tickUpperData.feeGrowthOutside0X128);
    feeGrowthAbove1 = subMod(feeGrowthGlobal1X128, tickUpperData.feeGrowthOutside1X128);
  }

  // feeGrowthInside
  const feeGrowthInside0 = subMod(subMod(feeGrowthGlobal0X128, feeGrowthBelow0), feeGrowthAbove0);
  const feeGrowthInside1 = subMod(subMod(feeGrowthGlobal1X128, feeGrowthBelow1), feeGrowthAbove1);

  // Unclaimed = (feeGrowthInside - feeGrowthInsideLast) * liquidity / 2^128
  const unclaimed0 = subMod(feeGrowthInside0, position.feeGrowthInside0LastX128) * position.liquidity / Q128;
  const unclaimed1 = subMod(feeGrowthInside1, position.feeGrowthInside1LastX128) * position.liquidity / Q128;

  // Add tokensOwed (previously snapshotted but not yet collected)
  const total0 = unclaimed0 + position.tokensOwed0;
  const total1 = unclaimed1 + position.tokensOwed1;

  return {
    fees0: Number(total0) / Math.pow(10, dec0),
    fees1: Number(total1) / Math.pow(10, dec1),
  };
}

// ============================================================
// Math helpers
// ============================================================
function tickToPrice(tick, dec0, dec1) {
  const raw = Math.pow(1.0001, tick);
  const adjusted = raw * Math.pow(10, dec0 - dec1);
  return 1 / adjusted;
}

function sqrtPriceToPrice(sqrtPriceX96, dec0, dec1) {
  const sqrtPrice = Number(sqrtPriceX96) / (2 ** 96);
  const price = sqrtPrice * sqrtPrice;
  const adjusted = price * Math.pow(10, dec0 - dec1);
  return 1 / adjusted;
}

function getTokenAmounts(liquidity, sqrtPriceX96, tickLower, tickUpper, dec0, dec1) {
  const sqrtA = Math.pow(1.0001, tickLower / 2);
  const sqrtB = Math.pow(1.0001, tickUpper / 2);
  const sqrtP = Number(sqrtPriceX96) / (2 ** 96);
  const liq = Number(liquidity);

  let amount0 = 0, amount1 = 0;
  if (sqrtP <= sqrtA) {
    amount0 = liq * (1/sqrtA - 1/sqrtB);
  } else if (sqrtP >= sqrtB) {
    amount1 = liq * (sqrtB - sqrtA);
  } else {
    amount0 = liq * (1/sqrtP - 1/sqrtB);
    amount1 = liq * (sqrtP - sqrtA);
  }

  return {
    amount0: amount0 / Math.pow(10, dec0),
    amount1: amount1 / Math.pow(10, dec1),
  };
}

  const currentPrice = sqrtPriceToPrice(poolData.sqrtPriceX96, d0, d1);
  const priceA = tickToPrice(pos.tickLower, d0, d1);
  const priceB = tickToPrice(pos.tickUpper, d0, d1);
  const lowerPrice = Math.min(priceA, priceB);
  const upperPrice = Math.max(priceA, priceB);

  const inRange = poolData.tick >= pos.tickLower && poolData.tick < pos.tickUpper;
  const distToLower = ((currentPrice - lowerPrice) / currentPrice) * 100;
  const distToUpper = ((upperPrice - currentPrice) / currentPrice) * 100;
  const nearEdge = inRange && Math.min(distToLower, distToUpper) < 2;

  const amounts = getTokenAmounts(pos.liquidity, poolData.sqrtPriceX96, pos.tickLower, pos.tickUpper, d0, d1);
  const totalValueUSD = amounts.amount0 + (amounts.amount1 * currentPrice);

  const uncollected0 = feesData ? feesData.fees0 : 0;
  const uncollected1 = feesData ? feesData.fees1 : 0;
  const uncollectedUSD = uncollected0 + (uncollected1 * currentPrice);

  const totalFees0 = harvested.fees0 + uncollected0;
  const totalFees1 = harvested.fees1 + uncollected1;
  const totalFeesUSD = totalFees0 + (totalFees1 * currentPrice);

function formatNum(n, decimals) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  return Number(n).toLocaleString('en-US', {
    minimumFractionDigits: decimals,
    maximumFractionDigits: decimals,
  });
}

          // data = recipient(address padded 32) + amount0(uint128 padded 32) + amount1(uint128 padded 32)
          const a0 = Number(BigInt('0x' + d.slice(66, 130))) / Math.pow(10, dec0);
          const a1 = Number(BigInt('0x' + d.slice(130, 194))) / Math.pow(10, dec1);

    let totalFeesEUR = 0;

    for (const pos of positions) {

      const poolAddr = await getPoolAddress(pos.token0, pos.token1, pos.fee);

      const [poolData, feeGlobals, tickLowerData, tickUpperData, llamaData, mintTs, harvested] = await Promise.all([

        fetchFeeGrowthGlobals(poolAddr),
        fetchTickData(pos.tickLower, poolAddr),

        fetchMintTimestamp(pos.tokenId),
        fetchHarvestedFees(pos.tokenId, pos.token0Decimals, pos.token1Decimals),
      ]);

      // Fetch BTC entry price (needs mintTs)
      const btcEntry = mintTs ? await fetchBtcPriceAtTime(mintTs) : null;

      pos._harvestedFees = harvested;
      const feesData = computeUnclaimedFees(pos, feeGlobals, tickLowerData, tickUpperData, poolData.tick, pos.token0Decimals, pos.token1Decimals);
      const card = renderPositionCard(pos, poolData, feesData, eurRate, llamaData, mintTs, btcEntry);
      totalPortfolioUSD += card.totalValueUSD;
      totalFeesEUR += card.feesEUR;
      cards.push(card);
    }

    const now = new Date().toLocaleTimeString('fr-BE', { hour: '2-digit', minute: '2-digit', second: '2-digit' });

    // Global KPIs — fees from best source (auto-detect OR ledger) + uncollected
    const currentBtcPrice = cards[0]?.currentPrice || 0;
    const historicalFees = await fetchAllHistoricalFees();

    // Ledger = manual fallback for when BaseScan fails
    const ledgerUsdc = HARVESTED_FEES_LEDGER.reduce((s, e) => s + (e.usdc || 0), 0);
    const ledgerBtc = HARVESTED_FEES_LEDGER.reduce((s, e) => s + (e.btc || 0), 0);

    // Use whichever source is higher (auto-detect when BaseScan works, ledger as safety net)
    const harvestedUsdc = Math.max(historicalFees.collected0, ledgerUsdc);
    const harvestedBtc = Math.max(historicalFees.collected1, ledgerBtc);

    // Current uncollected from active positions
    const activeUncollected0 = cards.reduce((s, c) => s + (c._uncollected0 || 0), 0);
    const activeUncollected1 = cards.reduce((s, c) => s + (c._uncollected1 || 0), 0);

    // Total fees = harvested (best of auto/ledger) + uncollected
    const globalTotalFeesUSD = (harvestedUsdc + activeUncollected0) + ((harvestedBtc + activeUncollected1) * currentBtcPrice);
    console.log('Global fees:', { autoUsdc: historicalFees.collected0.toFixed(4), autoBtc: historicalFees.collected1.toFixed(8), ledgerUsdc, ledgerBtc, uncollected0: activeUncollected0.toFixed(4), uncollected1: activeUncollected1.toFixed(8), totalUSD: globalTotalFeesUSD.toFixed(2) });
    const globalTotalFeesEUR = globalTotalFeesUSD * eurRate;

    // Global APY
    const globalElapsed = Math.floor(Date.now() / 1000) - FIRST_DEPOSIT_TS;
    const globalAPY = (globalElapsed > 86400 && INITIAL_INVESTMENT > 0) ? (globalTotalFeesUSD / INITIAL_INVESTMENT) * (365 * 86400 / globalElapsed) * 100 : 0;
    // Capital flow balance
    const totalIn = CAPITAL_FLOWS.filter(f => f.type === 'in').reduce((s, f) => s + f.amount, 0);
    const totalOut = CAPITAL_FLOWS.filter(f => f.type === 'out').reduce((s, f) => s + f.amount, 0);
    const balance = totalPortfolioUSD + totalOut + globalTotalFeesUSD - totalIn;

    // Render
    const widget = document.getElementById('widget');

    const globalHeader = `
      <div style="padding: 8px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border);">
        <span style="font-size: 12px; font-weight: 700;">DeFi Monitor · ${CONFIG.sickleAddress.slice(0,6)}…${CONFIG.sickleAddress.slice(-4)}</span>
        <span style="font-size: 10px; color: var(--text-dim);">${now}</span>
      </div>

      <div class="kpi-grid" style="background: rgba(63,185,80,0.03); border-bottom: 1px solid var(--border);">
        <div class="kpi">
          <span class="kpi-label">Position Value</span>
          <span class="kpi-value">$${formatNum(totalPortfolioUSD, 2)}</span>
          <span class="kpi-sub">invested $${formatNum(INITIAL_INVESTMENT, 0)}</span>
        </div>
        <div class="kpi">
          <span class="kpi-label">Total Fees</span>
          <span class="kpi-value positive">$${formatNum(globalTotalFeesUSD, 2)}</span>
          <span class="kpi-sub">APY ${formatNum(globalAPY, 1)}%</span>
        </div>
        <div class="kpi">
          <span class="kpi-label">Balance</span>
          <span class="kpi-value ${balance >= 0 ? 'positive' : 'negative'}">${balance >= 0 ? '+' : ''}$${formatNum(balance, 2)}</span>
          <span class="kpi-sub">in $${formatNum(totalIn, 0)} · out $${formatNum(totalOut, 0)}</span>
        </div>
      </div>
    `;

    widget.innerHTML = `
      ${globalHeader}
      <div style="padding: 6px 20px; background: var(--bg); border-bottom: 1px solid var(--border);">
        <span style="font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px;">${positions.length} active position${positions.length > 1 ? 's' : ''}</span>
      </div>
      ${cards.map(c => c.html).join('<div style="border-top: 2px solid var(--border);"></div>')}
      <div id="btc-chart-container" style="margin-top: 12px; border: 1px solid var(--border); border-radius: 10px; background: var(--card-bg);">${btcChartHtml}</div>
    `;
  } catch (err) {
    console.error('Update error:', err);
    document.getElementById('widget').innerHTML += `
      <div class="error-msg">Error: ${err.message}<br>Retrying in ${CONFIG.refreshInterval/1000}s...</div>
    `;
  }
}

// BTC chart with period selector
const btcChartCache = {};
let btcChartPeriod = 5;

async function fetchBtcChart(days) {
  if (btcChartCache[days] && Date.now() - btcChartCache[days].ts < 300000) return btcChartCache[days].data;
  for (let attempt = 0; attempt < 3; attempt++) {
    try {
      if (attempt > 0) await new Promise(r => setTimeout(r, 2000));
      const res = await fetch(`https://api.coingecko.com/api/v3/coins/bitcoin/market_chart?vs_currency=usd&days=${days}`);
      if (res.status === 429) { continue; }
      const data = await safeJson(res);
      if (!data) continue;
      if (data.prices) {
        btcChartCache[days] = { data: data.prices, ts: Date.now() };
        return data.prices;
      }
    } catch {}
  }
  return btcChartCache[days]?.data || null;
}

function renderBtcChart(prices, activeDays) {
  if (!prices || prices.length < 2) return '<div style="padding:20px;color:var(--text-dim);font-size:11px;">BTC chart unavailable</div>';
  // Downsample to max 200 points
  let sampled = prices;
  if (prices.length > 200) {
    const step = Math.ceil(prices.length / 200);
    sampled = prices.filter((_, i) => i % step === 0);
    if (sampled[sampled.length - 1] !== prices[prices.length - 1]) sampled.push(prices[prices.length - 1]);
  }
  const vals = sampled.map(p => p[1]);
  let minP = vals[0], maxP = vals[0];
  for (let i = 1; i < vals.length; i++) { if (vals[i] < minP) minP = vals[i]; if (vals[i] > maxP) maxP = vals[i]; }
  const first = vals[0];
  const last = vals[vals.length - 1];
  const change = ((last - first) / first) * 100;
  const isUp = change >= 0;

  const w = 600, h = 120, pad = 2;
  const range = maxP - minP || 1;
  const stepX = w / (vals.length - 1);

  let path = '';
  vals.forEach((v, i) => {
    const x = i * stepX;
    const y = h - pad - ((v - minP) / range) * (h - pad * 2);
    path += (i === 0 ? 'M' : 'L') + x.toFixed(1) + ',' + y.toFixed(1);
  });

  const lastX = (vals.length - 1) * stepX;
  const areaPath = path + ` L${lastX.toFixed(1)},${h} L0,${h} Z`;
  const color = isUp ? '#3fb950' : '#f85149';
  const colorFaint = isUp ? 'rgba(63,185,80,0.08)' : 'rgba(248,81,73,0.08)';

  const firstDate = new Date(sampled[0][0]);
  const lastDate = new Date(sampled[sampled.length - 1][0]);
  const fmtDate = d => d.toLocaleDateString('en', { month: 'short', day: 'numeric' });

  const periods = [
    { days: 5, label: '5D' },
    { days: 30, label: '1M' },
    { days: 90, label: '3M' },
  ];
  const btnStyle = (d) => `cursor:pointer; padding: 2px 8px; border-radius: 4px; border: 1px solid ${d === activeDays ? 'var(--text)' : 'var(--border)'}; background: ${d === activeDays ? 'var(--text)' : 'transparent'}; color: ${d === activeDays ? 'var(--bg)' : 'var(--text-dim)'}; font-size: 9px; font-weight: 600;`;

  return `
    <div style="padding: 16px 20px;">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
        <div style="display: flex; align-items: center; gap: 8px;">
          <span style="font-size: 11px; font-weight: 600; color: var(--text);">BTC</span>
          <div style="display: flex; gap: 4px;">
            ${periods.map(p => `<span style="${btnStyle(p.days)}" onclick="switchBtcPeriod(${p.days})">${p.label}</span>`).join('')}
          </div>
        </div>
        <span style="font-size: 11px; color: ${color}; font-weight: 600;">$${formatNum(last, 0)} (${isUp ? '+' : ''}${change.toFixed(1)}%)</span>
      </div>
      <svg viewBox="0 0 ${w} ${h}" style="width:100%;height:${h}px;" preserveAspectRatio="none">
        <path d="${areaPath}" fill="${colorFaint}" />
        <path d="${path}" fill="none" stroke="${color}" stroke-width="1.5" />
      </svg>
      <div style="display: flex; justify-content: space-between; margin-top: 4px;">
        <span style="font-size: 9px; color: var(--text-dim);">${fmtDate(firstDate)}</span>
        <span style="font-size: 9px; color: var(--text-dim);">$${formatNum(minP, 0)} — $${formatNum(maxP, 0)}</span>
        <span style="font-size: 9px; color: var(--text-dim);">${fmtDate(lastDate)}</span>
      </div>
    </div>
  `;
}

async function updateBtcChart() {
  const prices = await fetchBtcChart(btcChartPeriod);
  btcChartHtml = renderBtcChart(prices, btcChartPeriod);
  const el = document.getElementById('btc-chart-container');
  if (el) el.innerHTML = btcChartHtml;
}

async function switchBtcPeriod(days) {
  btcChartPeriod = days;
  const el = document.getElementById('btc-chart-container');
  if (el && !btcChartCache[days]) el.innerHTML = '<div style="padding:20px;color:var(--text-dim);font-size:11px;">Loading...</div>';
  await updateBtcChart();
}

// Start — chart loads AFTER first update to avoid CoinGecko rate limit
let btcChartHtml = '';
(async () => {
  await update();
  // Wait before chart calls — CoinGecko needs breathing room
  await new Promise(r => setTimeout(r, 5000));
  await fetchBtcChart(5);
  updateBtcChart();
  await new Promise(r => setTimeout(r, 5000));
  fetchBtcChart(30);
  await new Promise(r => setTimeout(r, 5000));
  fetchBtcChart(90);
  // Then loop
  setInterval(update, CONFIG.refreshInterval);
  setInterval(updateBtcChart, 300000);
})();
</script>
